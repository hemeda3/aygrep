name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo build --release
      - name: Smoke test
        run: |
          git config --global user.email "ci@ayg.dev"
          git config --global user.name "ayg-ci"
          mkdir -p /tmp/test-repo
          echo 'fn main() { println!("hello"); }' > /tmp/test-repo/test.rs
          cd /tmp/test-repo && git init && git add . && git commit -m "init"
          $GITHUB_WORKSPACE/target/release/ayg build .
          $GITHUB_WORKSPACE/target/release/ayg search "println"

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ayg-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: ayg-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: ayg-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: ayg-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/ayg ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256 2>/dev/null || sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
