name: CI
on: [push, pull_request]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install ayg
        run: cargo install --path .

      - name: Verify install
        run: ayg --version

      - name: Smoke test
        run: |
          git config --global user.email "ci@ayg.dev"
          git config --global user.name "ayg-ci"
          mkdir -p /tmp/test-repo
          echo 'fn main() { println!("hello"); }' > /tmp/test-repo/test.rs
          echo 'fn foo() { println!("world"); }' > /tmp/test-repo/test2.rs
          cd /tmp/test-repo && git init && git add . && git commit -m "init"
          ayg build .
          ayg search "println"
          ayg search "hello"

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/configure-pages@v5

      - name: Install ayg
        run: cargo install --path .

      - name: Install ripgrep from source
        run: |
          git clone --depth=1 https://github.com/BurntSushi/ripgrep /tmp/ripgrep
          cd /tmp/ripgrep && cargo install --path .

      - name: "ayg vs ripgrep — Linux kernel cold + hot"
        run: ./scripts/benchmark-full.sh linux
        env:
          AYG_BIN: /home/runner/.cargo/bin/ayg
          BENCH_DIR: /tmp/ayg-bench

      - name: Publish benchmark summary
        if: always()
        run: |
          if [ -f /tmp/ayg-bench/results.md ]; then
            cat /tmp/ayg-bench/results.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-benchmark-linux
          path: /tmp/ayg-bench/public
          if-no-files-found: warn

      - name: Upload Pages artifact
        if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/ayg-bench/public

  deploy-benchmark-pages:
    if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy benchmark site
        id: deployment
        uses: actions/deploy-pages@v4
