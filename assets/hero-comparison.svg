<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Actions benchmark: ayg vs ripgrep</title>
  <desc id="desc">Simple horizontal bar chart comparing ayg and ripgrep on the Linux kernel benchmark from GitHub Actions hot-cache runs.</desc>

