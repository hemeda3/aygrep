name: CI
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install ayg
        run: cargo install --path .

      - name: Verify install
        run: ayg --version

      - name: Smoke test
        run: |
          git config --global user.email "ci@ayg.dev"
          git config --global user.name "ayg-ci"
          mkdir -p /tmp/test-repo
          echo 'fn main() { println!("hello"); }' > /tmp/test-repo/test.rs
          echo 'fn foo() { println!("world"); }' > /tmp/test-repo/test2.rs
          cd /tmp/test-repo && git init && git add . && git commit -m "init"
          ayg build .
          ayg search "println"
          ayg search "hello"

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install ayg
        run: cargo install --path .

      - name: Install ripgrep from source
        run: |
          git clone --depth=1 https://github.com/BurntSushi/ripgrep /tmp/ripgrep
          cd /tmp/ripgrep && cargo install --path .

      - name: Clone Linux kernel
        run: git clone --depth=1 https://github.com/BurntSushi/linux /tmp/linux

      - name: Build index
        run: cd /tmp/linux && ayg build .

      - name: "ayg vs ripgrep — Linux kernel (79K files)"
        run: |
          cd /tmp/linux
          echo ""
          printf "%-20s %10s %10s %10s %10s\n" "Pattern" "ayg(ms)" "rg(ms)" "Speedup" "Files"
          printf "%-20s %10s %10s %10s %10s\n" "--------------------" "----------" "----------" "----------" "----------"

          for pat in "PM_RESUME" "EXPORT_SYMBOL_GPL" "Copyright" "mutex_lock" "struct device"; do
            ayg_out=$(ayg search "$pat" 2>/dev/null)
            ayg_ms=$(echo "$ayg_out" | grep -oP 'total=\s*\K[\d.]+' || echo "N/A")
            ayg_files=$(echo "$ayg_out" | grep -oP 'files=\s*\K\d+' || echo "0")

            rg_start=$(date +%s%3N)
            rg -c "$pat" . >/dev/null 2>&1
            rg_end=$(date +%s%3N)
            rg_ms=$((rg_end - rg_start))

            speedup="—"
            if [ "$ayg_ms" != "N/A" ] && [ "$ayg_ms" != "0.0" ]; then
              speedup=$(python3 -c "print(f'{${rg_ms}/float(\"${ayg_ms}\"):.0f}x')" 2>/dev/null || echo "—")
            fi

            printf "%-20s %10s %10s %10s %10s\n" "$pat" "${ayg_ms}ms" "${rg_ms}ms" "$speedup" "$ayg_files"
          done
